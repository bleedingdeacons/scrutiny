name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: PHP 8.1
    runs-on: ubuntu-latest

    defaults:
      run:
        # Scrutiny is checked out alongside Unity, Sentinel and
        # tsml-for-unity, mirroring a WordPress plugins/ directory, so run
        # everything from inside Scrutiny.
        working-directory: scrutiny

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: scrutiny

      - name: Checkout Unity
        # Load-bearing for both gates: phpstan.neon.dist scans ../unity/src,
        # and tests/bootstrap.php maps the Unity namespace to the same path at
        # runtime. Without it the test suite cannot even load.
        uses: actions/checkout@v4
        with:
          repository: bleedingdeacons/unity
          ref: main
          path: unity

      - name: Checkout Sentinel
        # Provides Sentinel_Log_Channel, referenced in type positions.
        uses: actions/checkout@v4
        with:
          repository: bleedingdeacons/sentinel
          ref: main
          path: sentinel

      - name: Checkout tsml-for-unity
        # Scanned by phpstan.neon.dist so cross-plugin symbols resolve.
        uses: actions/checkout@v4
        with:
          repository: bleedingdeacons/tsml-for-unity
          ref: main
          path: tsml-for-unity

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          # zip: build.php assembles the release archive with ZipArchive.
          extensions: mbstring, intl, json, zip
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          # Keyed on composer.json: composer.lock is untracked in several of
          # these repos, so it is not a reliable cache key across the suite.
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php8.1-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php8.1-composer-

      # --- Gates -----------------------------------------------------------
      # These fail the build. Each is verified to pass across the suite today.

      - name: Validate composer.json
        # --no-check-lock: composer.lock is untracked in some repos and drifted
        # from composer.json in others. Lock state is reported as advisory
        # below rather than blocking every PR in the suite.
        run: composer validate --no-check-lock

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Lint PHP syntax
        # Shipped code only: tests/ is covered by the advisory test run, and
        # some suites currently contain files that cannot be parsed.
        run: |
          status=0
          while IFS= read -r -d '' file; do
            if ! out=$(php -l "$file" 2>&1); then
              echo "$out"
              status=1
            fi
          done < <(find . -path ./vendor -prune -o -path ./build -prune \
                        -o -path ./tests -prune -o -path ./node_modules -prune \
                        -o -name '*.php' -print0)
          exit $status

      - name: Build production archive
        # The build is what /bump ships, so a broken build must fail the PR.
        run: composer build:production

      - name: PHPStan
        # A gate, promoted from advisory now the repo is green. It ran advisory
        # against a checkout with no sibling plugins, so it could not resolve a
        # single Unity symbol and reported hundreds of "class not found" — all
        # swallowed by continue-on-error.
        run: composer phpstan

      - name: PHPUnit
        # A gate. There was no test step here at all, which is how the suite
        # came to be unrunnable without anyone noticing.
        run: composer test

      # --- Advisory --------------------------------------------------------
      # Reported but not yet enforced. Promote to a gate once a repo is green.

      - name: composer.lock up to date (advisory)
        run: composer validate
        continue-on-error: true
